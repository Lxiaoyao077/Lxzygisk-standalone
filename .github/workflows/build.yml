name: Lxzygisk CI Build
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/PerformanC/ReZygisk.git
          git fetch upstream main --depth=1
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup NDK
        run: |
          NDK_PATH="$ANDROID_HOME/ndk/27.2.12479018"
          if [ ! -d "$NDK_PATH" ]; then
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.2.12479018"
          fi
          echo "NDK_PATH=$NDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
      - name: Setup CMake and Ninja
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build
      - name: Build all (j1)
        run: make all -j1 2>&1 | tail -30
