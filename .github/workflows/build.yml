name: Lxzygisk CI Build
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      NDK_VERSION: 27.2.12479018
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/PerformanC/ReZygisk.git
          git fetch upstream main --depth=1
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'
      - name: Setup NDK r27c
        run: |
          NDK_ZIP="android-ndk-r27c-linux.zip"
          NDK_URL="https://dl.google.com/android/repository/${NDK_ZIP}"
          mkdir -p $ANDROID_HOME/ndk
          if [ ! -d "$ANDROID_HOME/ndk/$NDK_VERSION" ]; then
            wget -q $NDK_URL
            unzip -q $NDK_ZIP -d $ANDROID_HOME/ndk/
            mv $ANDROID_HOME/ndk/android-ndk-r27c $ANDROID_HOME/ndk/$NDK_VERSION
            rm $NDK_ZIP
          fi
          echo "NDK_PATH=$ANDROID_HOME/ndk/$NDK_VERSION" >> $GITHUB_ENV
      - name: Setup CMake and Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
      - name: Build Lxzygisk (${{ matrix.build_type }})
        run: make ${{ matrix.build_type }} -j$(nproc)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Lxzygisk-${{ matrix.build_type }}
          path: build/out/Lxzygisk-*-${{ matrix.build_type }}.zip
  package:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package APatch module
        run: |
          mkdir -p module
          cp module.prop module/
          for dir in artifacts/Lxzygisk-debug artifacts/Lxzygisk-release; do
            if [ -d "$dir" ]; then
              cp $dir/*.zip module/ 2>/dev/null || true
            fi
          done
          VERSION=$(grep version module.prop | cut -d= -f2)
          cd module && zip -r ../Lxzygisk-v$VERSION-apatch.zip .
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lxzygisk-apatch-module
          path: Lxzygisk-*-apatch.zip
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Lxzygisk Build #${{ github.run_number }}
          files: Lxzygisk-*-apatch.zip
          draft: false
          prerelease: false
          generate_release_notes: true
