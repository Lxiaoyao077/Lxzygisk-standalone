name: Lxzygisk CI Build
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86, x86_64]
        build_type: [debug, release]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'
      - name: Setup NDK r27c
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
      - name: Setup CMake and Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
      - name: Build Lxzygisk (${{ matrix.arch }} ${{ matrix.build_type }})
        run: |
          ./build.sh ${{ matrix.arch }} ${{ matrix.build_type }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Lxzygisk-${{ matrix.arch }}-${{ matrix.build_type }}
          path: out/${{ matrix.build_type }}/${{ matrix.arch }}/
  package:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package APatch module
        run: |
          mkdir -p module
          cp module.prop module/
          for arch in arm64-v8a armeabi-v7a x86 x86_64; do
            mkdir -p module/zygisk/$arch
            cp artifacts/Lxzygisk-$arch-debug/zygisk.so module/zygisk/$arch/ 2>/dev/null || true
            cp artifacts/Lxzygisk-$arch-release/zygisk.so module/zygisk/$arch/ 2>/dev/null || true
          done
          VERSION=$(grep version module.prop | cut -d= -f2)
          cd module && zip -r ../Lxzygisk-v$VERSION-apatch.zip .
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lxzygisk-apatch-module
          path: Lxzygisk-*-apatch.zip
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Lxzygisk Build #${{ github.run_number }}
          files: Lxzygisk-*-apatch.zip
          draft: false
          prerelease: false
          generate_release_notes: true
